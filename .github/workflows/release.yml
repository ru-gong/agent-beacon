name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="0.1.0"
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build app bundle
        run: |
          iconutil -c icns assets/agent-beacon.iconset -o assets/agent-beacon.icns
          pyinstaller \
            --name "Agent Beacon" \
            --windowed \
            --clean \
            --noconfirm \
            --icon assets/agent-beacon.icns \
            --add-data "assets/agent-beacon-icon-1024.png:assets" \
            --add-data "assets/agent-beacon-icon.png:assets" \
            --collect-submodules pystray \
            --collect-submodules PIL \
            packaging/agent_beacon_launcher.py

      - name: Create DMG
        run: |
          mkdir -p release/macos
          hdiutil create \
            -volname "Agent Beacon" \
            -srcfolder "dist/Agent Beacon.app" \
            -ov \
            -format UDZO \
            "release/macos/Agent-Beacon-${APP_VERSION}-macOS.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/macos/*.dmg

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          if ($version -eq "${env:GITHUB_REF_NAME}") {
            $version = "0.1.0"
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
          choco install nsis -y --no-progress

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller `
            --name "Agent Beacon" `
            --noconsole `
            --onefile `
            --clean `
            --noconfirm `
            --icon assets/agent-beacon.ico `
            --add-data "assets/agent-beacon-icon-1024.png;assets" `
            --add-data "assets/agent-beacon-icon.png;assets" `
            --collect-submodules pystray `
            --collect-submodules PIL `
            packaging/agent_beacon_launcher.py

      - name: Build NSIS installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release/windows | Out-Null
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          makensis /DAPP_VERSION=$env:APP_VERSION packaging/windows_installer.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/windows/*.exe

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Agent Beacon ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release-assets/**/*
